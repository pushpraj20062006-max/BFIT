name: Android CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties for CI
        run: |
          echo "apiKey=CI_DUMMY_KEY" > local.properties
          echo "gemini.apiKey=CI_DUMMY_KEY" >> local.properties
          echo "google.webClientId=CI_DUMMY_ID" >> local.properties

      - name: Create dummy google-services.json
        run: |
          mkdir -p app
          echo '{
            "project_info": {
              "project_number": "000000000000",
              "project_id": "bfit-ci-dummy",
              "storage_bucket": "bfit-ci-dummy.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "com.example.bfit" }
              },
              "api_key": [{ "current_key": "CI_DUMMY_KEY" }]
            }],
            "configuration_version": "1"
          }' > app/google-services.json

      - name: Lint
        run: ./gradlew lintDebug --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bfit-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-lint-reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          if-no-files-found: ignore
          retention-days: 7
