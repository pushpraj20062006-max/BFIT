name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "apiKey=${{ secrets.API_KEY || 'CI_DUMMY_KEY' }}" > local.properties
          echo "gemini.apiKey=${{ secrets.GEMINI_API_KEY || 'CI_DUMMY_KEY' }}" >> local.properties
          echo "google.webClientId=${{ secrets.GOOGLE_WEB_CLIENT_ID || 'CI_DUMMY_ID' }}" >> local.properties

      - name: Create google-services.json from secret or dummy
        run: |
          mkdir -p app
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json
          else
            echo '{
              "project_info": {
                "project_number": "000000000000",
                "project_id": "bfit-release-dummy",
                "storage_bucket": "bfit-release-dummy.appspot.com"
              },
              "client": [{
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "com.example.bfit" }
                },
                "api_key": [{ "current_key": "CI_DUMMY_KEY" }]
              }],
              "configuration_version": "1"
            }' > app/google-services.json
          fi

      - name: Decode keystore when provided
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          echo "ANDROID_KEYSTORE_PATH=$PWD/release.keystore" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Determine artifact path
        id: apk
        run: |
          SIGNED_APK="app/build/outputs/apk/release/app-release.apk"
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "$SIGNED_APK" ]; then
            echo "path=$SIGNED_APK" >> $GITHUB_OUTPUT
          else
            echo "path=$UNSIGNED_APK" >> $GITHUB_OUTPUT
          fi

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bfit-release-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true